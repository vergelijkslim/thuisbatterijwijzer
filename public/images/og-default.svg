<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#164e63"/>
      <stop offset="40%" style="stop-color:#155e75"/>
      <stop offset="70%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Battery icon -->
  <rect x="525" y="140" width="150" height="80" rx="8" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="4"/>
  <rect x="675" y="165" width="12" height="30" rx="4" fill="rgba(255,255,255,0.9)"/>
  <rect x="540" y="155" width="80" height="50" rx="4" fill="rgba(103,232,249,0.6)"/>
  <!-- Site name -->
  <text x="600" y="310" font-family="Georgia, serif" font-size="52" font-weight="700" fill="white" text-anchor="middle">Vergelijk uw Thuisbatterij</text>
  <!-- Tagline -->
  <text x="600" y="370" font-family="system-ui, sans-serif" font-size="24" fill="rgba(255,255,255,0.85)" text-anchor="middle">Onafhankelijk advies over thuisbatterijen en energieopslag</text>
  <!-- Domain -->
  <text x="600" y="520" font-family="system-ui, sans-serif" font-size="20" fill="rgba(255,255,255,0.6)" text-anchor="middle">vergelijk-uw-thuisbatterij.nl</text>
  <!-- Decorative line -->
  <rect x="450" y="400" width="300" height="2" fill="rgba(103,232,249,0.4)" rx="1"/>
</svg>
